services:

  redis:
    image: redis:7-alpine
    container_name: intellmeet-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: intellmeet-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

   

  frontend:
    build: ./frontend
    container_name: intellmeet-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
  
    